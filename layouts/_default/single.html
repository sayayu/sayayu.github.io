{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{ if not .Date.IsZero }}
    <p class="post-meta">
      {{ .Date.Format "2006-01-02" }}
      {{ with .Params.tags }} · {{ delimit . ", " }}{{ end }}
    </p>
    {{ end }}
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
